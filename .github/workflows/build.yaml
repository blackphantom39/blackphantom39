name: build

on:
  push:
    branches: [master]
  schedule:
    # Daily at 04:00 UTC. Updates the rendered SVGs/README so the age and any
    # other date-derived bits stay current.
    - cron: '0 4 * * *'
  workflow_dispatch:

# Least-privilege token: only allowed to write back the generated artifacts.
permissions:
  contents: write

# Prevent overlapping scheduled and push-triggered runs from racing each other.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Generate README and SVGs
        run: go run .

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain README.md dark.svg light.svg)" ]]; then
            echo "no changes to commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md dark.svg light.svg
          git commit -m "chore(build): refresh generated artifacts"
          git push
